<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}My Learning Vault{% endblock %}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
    </head>
    <body class="{% block body_class %}{% endblock %}">
        <div class="app-shell">
            <header class="site-header">
                <div class="shell nav-shell">
                    <a class="brand" href="{{ url_for('index') }}">
                        <span class="brand-mark">MLV</span>
                        <span class="brand-copy">
                            <strong>My Learning Vault</strong>
                            <span>Digital course notebook</span>
                        </span>
                    </a>
                    <form action="{{ url_for('search') }}" class="search-form" method="get">
                        <input name="q" placeholder="Search notes, lessons, modules..." type="search" value="{{ request.args.get('q', '') }}">
                    </form>
                </div>
            </header>

            <main class="page">
                {% block content %}{% endblock %}
            </main>
        </div>
    </body>
</html>
